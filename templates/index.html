<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="container">
    <header class="topbar card">
      <div>
        <h1>Expense Tracker</h1>
        <p class="subtitle">Track your income, expenses, and cash flow.</p>
      </div>
      <button id="themeToggle" class="secondary-btn" type="button">🌙 Dark Mode</button>
    </header>

    <section class="summary-grid">
      <article class="card summary-card">
        <h2>Total Balance</h2>
        <p id="balance" class="summary-value">$0.00</p>
      </article>
      <article class="card summary-card">
        <h2>Total Income</h2>
        <p id="income" class="summary-value income">$0.00</p>
      </article>
      <article class="card summary-card">
        <h2>Total Expense</h2>
        <p id="expense" class="summary-value expense">$0.00</p>
      </article>
    </section>

    <section class="dashboard-grid">
      <article class="card">
        <h2 id="formTitle">Add Transaction</h2>
        <form id="transactionForm">
          <input type="hidden" id="transactionId" />

          <label for="type">Type</label>
          <select id="type" required>
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>

          <label for="amount">Amount</label>
          <input id="amount" type="number" step="0.01" min="0" placeholder="0.00" required />

          <label for="category">Category</label>
          <input id="category" type="text" placeholder="Salary, Food, Rent..." required />

          <label for="date">Date</label>
          <input id="date" type="date" required />

          <label for="notes">Notes</label>
          <textarea id="notes" rows="3" placeholder="Optional notes"></textarea>

          <div class="form-actions">
            <button id="saveButton" class="primary-btn" type="submit">Save Transaction</button>
            <button id="cancelEdit" class="secondary-btn hidden" type="button">Cancel Edit</button>
          </div>
        </form>
      </article>

      <article class="card">
        <div class="list-header">
          <h2>Transactions</h2>
          <div class="filters">
            <select id="filterType">
              <option value="">All Types</option>
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
            <input id="filterStartDate" type="date" />
            <input id="filterEndDate" type="date" />
            <button id="clearFilters" class="secondary-btn" type="button">Clear</button>
          </div>
        </div>

        <div class="chart-wrap">
          <h3>Income vs Expense</h3>
          <canvas id="financeChart" width="640" height="240"></canvas>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Description</th>
                <th>Type</th>
                <th>Amount</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="transactionTableBody">
              <tr>
                <td colspan="5" class="empty">No transactions found.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </article>
    </section>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
